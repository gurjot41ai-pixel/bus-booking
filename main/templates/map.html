<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusGo — Route Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0f1e;
    --card: #1a2236;
    --accent: #f97316;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  nav {
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,30,0.95);
    z-index: 1000;
    flex-shrink: 0;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  .map-wrapper { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 300px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 0.8rem; }

  .stats-row { display: flex; gap: 1rem; }
  .stat { flex: 1; background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.2); border-radius: 8px; padding: 0.6rem 0.8rem; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--muted); }

  .sidebar-body { flex: 1; overflow-y: auto; padding: 1rem; }

  .section-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.6rem; margin-top: 1rem; }
  .section-label:first-child { margin-top: 0; }

  .city-item, .route-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0.7rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; font-size: 0.88rem; margin-bottom: 0.3rem; }
  .city-item:hover, .route-item:hover { background: rgba(255,255,255,0.05); }
  .city-item:hover .city-name { color: var(--accent); }

  .city-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .route-arrow { color: var(--accent); font-size: 0.8rem; }

  /* Loading indicator */
  .route-loading { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

  .offline-btn { margin: 1rem; padding: 0.7rem; background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); border-radius: 8px; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; text-align: center; transition: background 0.2s; flex-shrink: 0; }
  .offline-btn:hover { background: rgba(249,115,22,0.25); }

  #map { flex: 1; }

  .leaflet-popup-content-wrapper { background: #1a2236 !important; border: 1px solid rgba(249,115,22,0.3) !important; border-radius: 10px !important; color: #f1f5f9 !important; box-shadow: 0 8px 30px rgba(0,0,0,0.5) !important; }
  .leaflet-popup-tip { background: #1a2236 !important; }
  .leaflet-popup-content { margin: 12px 16px !important; font-family: 'DM Sans', sans-serif; min-width: 180px; }
  .popup-city { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #f97316; margin-bottom: 4px; }
  .popup-route { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
  .popup-row { font-size: 0.8rem; color: #94a3b8; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .popup-row strong { color: #f1f5f9; }
  .popup-detail { font-size: 0.78rem; color: #94a3b8; }

  .track-panel { position: absolute; bottom: 24px; right: 24px; z-index: 999; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; min-width: 220px; display: none; }
  .track-panel.active { display: block; }
  .track-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; margin-bottom: 0.5rem; }
  .track-bus { font-size: 0.8rem; color: var(--muted); }
  .track-close { float: right; cursor: pointer; color: var(--muted); }

  @media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Bus<span>Go</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/map/" class="active">🗺 Map</a>
  </div>
</nav>

<div class="map-wrapper">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">🗺 Network Overview</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">{{ total_cities }}</div><div class="stat-label">Cities</div></div>
        <div class="stat"><div class="stat-num">{{ total_routes }}</div><div class="stat-label">Routes</div></div>
      </div>
    </div>
    <div class="sidebar-body" id="sidebarBody">
      <div class="section-label">Cities</div>
      <div id="cityList"></div>
      <div class="section-label">Routes</div>
      <div id="routeList"></div>
    </div>
    <button class="offline-btn" onclick="saveOffline()">💾 Save Map for Offline Use</button>
  </div>

  <div id="map"></div>

  <div class="track-panel" id="trackPanel">
    <span class="track-close" onclick="document.getElementById('trackPanel').classList.remove('active')">✕</span>
    <div class="track-title">🚌 Live Tracking</div>
    <div class="track-bus" id="trackInfo">Select a route to simulate</div>
  </div>
</div>

<script>
const cities = {{ cities_json|safe }};
const routes = {{ routes_json|safe }};

// ── Map init ──────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([39.5, -98.35], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// ── City markers ──────────────────────────────────────────
const cityMarkers = {};
const cityList = document.getElementById('cityList');

cities.forEach(city => {
  const marker = L.circleMarker([city.lat, city.lng], {
    radius: 9, fillColor: '#f97316', color: '#fff',
    weight: 2, opacity: 1, fillOpacity: 0.9
  }).addTo(map);

  marker.bindPopup(`
    <div class="popup-city">📍 ${city.name}</div>
    <div class="popup-detail">${city.lat.toFixed(4)}, ${city.lng.toFixed(4)}</div>
  `);

  cityMarkers[city.name] = marker;

  const item = document.createElement('div');
  item.className = 'city-item';
  item.innerHTML = `<div class="city-dot"></div><span class="city-name">${city.name}</span>`;
  item.onclick = () => { map.setView([city.lat, city.lng], 8); marker.openPopup(); };
  cityList.appendChild(item);
});

// ── Road routing via OSRM (free, no API key) ─────────────
// This draws the bus route ALONG REAL ROADS instead of straight lines over ocean
const routeList = document.getElementById('routeList');
const drawnRoutes = [];

async function fetchRoadRoute(fromLat, fromLng, toLat, toLng) {
  // Try OpenRouteService (free, no key needed for this endpoint)
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);
  try {
    const body = {
      coordinates: [[fromLng, fromLat], [toLng, toLat]],
      instructions: false
    };
    const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "5b3ce3597851110001cf6248a2e9a8b9a3f84b1bb4a1e5a5f1a0e1d4" },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);
    if (res.ok) {
      const data = await res.json();
      const coords = data.features[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      if (coords.length > 2) { console.log("ORS routing OK:", fromLat, toLat, coords.length, "pts"); return coords; }
    }
  } catch(e) {
    clearTimeout(timeout);
    console.warn("ORS failed:", e.message);
  }

  // Fallback 2: OSRM
  const controller2 = new AbortController();
  const timeout2 = setTimeout(() => controller2.abort(), 8000);
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`;
    const res2 = await fetch(url, { signal: controller2.signal });
    clearTimeout(timeout2);
    const data2 = await res2.json();
    if (data2.code === "Ok" && data2.routes && data2.routes.length > 0) {
      const coords2 = data2.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      if (coords2.length > 2) { console.log("OSRM routing OK"); return coords2; }
    }
  } catch(e) {
    clearTimeout(timeout2);
    console.warn("OSRM also failed:", e.message);
  }

  // Final fallback: inland waypoint routing to avoid ocean
  console.warn("Using inland waypoint fallback for", fromLat, toLat);
  return buildInlandRoute(fromLat, fromLng, toLat, toLng);
}

// Builds a route via inland waypoints to avoid the ocean
function buildInlandRoute(lat1, lng1, lat2, lng2) {
  // For US East Coast: push route inland (westward) to avoid ocean
  const isEastCoast = lng1 > -80 && lng2 > -80;
  const points = [];
  const steps = 30;

  if (isEastCoast) {
    // Force midpoint to be clearly inland (westward)
    const midLat = (lat1 + lat2) / 2;
    const midLng = Math.min(lng1, lng2) - 0.3; // push west/inland
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const lat = (1-t)*(1-t)*lat1 + 2*(1-t)*t*midLat + t*t*lat2;
      const lng = (1-t)*(1-t)*lng1 + 2*(1-t)*t*midLng + t*t*lng2;
      points.push([lat, lng]);
    }
  } else {
    // Generic curve for non-East-Coast routes
    const midLat = (lat1 + lat2) / 2 + Math.abs(lat2 - lat1) * 0.1;
    const midLng = (lng1 + lng2) / 2;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const lat = (1-t)*(1-t)*lat1 + 2*(1-t)*t*midLat + t*t*lat2;
      const lng = (1-t)*(1-t)*lng1 + 2*(1-t)*t*midLng + t*t*lng2;
      points.push([lat, lng]);
    }
  }
  return points;
}

async function drawAllRoutes() {
  for (const route of routes) {
    const item = document.createElement('div');
    item.className = 'route-item';
    item.innerHTML = `
      <span>${route.from}</span>
      <span class="route-arrow">→</span>
      <span>${route.to}</span>
      <span class="route-loading" id="loading-${route.from}-${route.to}">⏳</span>
    `;
    routeList.appendChild(item);

    // Fetch real road path
    const roadPoints = await fetchRoadRoute(
      route.from_lat, route.from_lng,
      route.to_lat, route.to_lng
    );

    // Remove loading spinner
    const loader = document.getElementById(`loading-${route.from}-${route.to}`);
    if (loader) loader.remove();

    const line = L.polyline(roadPoints, {
      color: '#f97316', weight: 3, opacity: 0.7, dashArray: '10, 6'
    }).addTo(map);

    // Build popup with time info
    let popupHtml = `<div class="popup-route">${route.from} → ${route.to}</div>`;
    popupHtml += `<div class="popup-row">🚌 <strong>${route.trips}</strong> trip${route.trips !== 1 ? 's' : ''} available</div>`;
    if (route.dep_time && route.arr_time) {
      popupHtml += `<div class="popup-row">🕐 Departs: <strong>${route.dep_time}</strong></div>`;
      popupHtml += `<div class="popup-row">🏁 Arrives: <strong>${route.arr_time}</strong></div>`;
    }
    if (route.bus_name) {
      popupHtml += `<div class="popup-row">🚍 <strong>${route.bus_name}</strong></div>`;
    }
    if (route.price) {
      popupHtml += `<div class="popup-row">💵 From <strong>$${route.price}</strong></div>`;
    }
    if (route.distance_km) {
      popupHtml += `<div class="popup-row">📏 <strong>${route.distance_km} km</strong></div>`;
    }

    line.bindPopup(popupHtml);

    line.on('mouseover', () => line.setStyle({ color: '#fb923c', weight: 5, opacity: 1 }));
    line.on('mouseout', () => line.setStyle({ color: '#f97316', weight: 3, opacity: 0.7 }));

    // Store road points for bus tracking
    drawnRoutes.push({ line, route, roadPoints });

    item.onclick = () => {
      map.fitBounds(line.getBounds(), { padding: [60, 60] });
      line.openPopup();
      simulateTracking(route, roadPoints);
    };
  }
}

drawAllRoutes();

// ── Live bus tracking along road path ────────────────────
let trackingBus = null;
let trackStep = 0;
let trackPath = [];

function simulateTracking(route, roadPoints) {
  if (trackingBus) map.removeLayer(trackingBus);
  trackStep = 0;
  trackPath = roadPoints;

  trackingBus = L.marker(roadPoints[0], {
    icon: L.divIcon({
      html: '<div style="font-size:1.5rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6))">🚌</div>',
      iconSize: [28, 28], iconAnchor: [14, 14], className: ''
    })
  }).addTo(map);

  const panel = document.getElementById('trackPanel');
  const info = document.getElementById('trackInfo');
  panel.classList.add('active');

  let infoText = `${route.from} → ${route.to}`;
  if (route.dep_time) infoText += ` • Departs ${route.dep_time}`;
  info.textContent = infoText;

  // Animate along road segments
  let segIndex = 0;
  let segProgress = 0;
  clearInterval(window._trackInterval);

  window._trackInterval = setInterval(() => {
    if (segIndex >= trackPath.length - 1) { segIndex = 0; }
    segProgress += 0.04;
    if (segProgress >= 1) { segProgress = 0; segIndex++; }
    if (segIndex >= trackPath.length - 1) { segIndex = 0; }

    const from = trackPath[segIndex];
    const to = trackPath[Math.min(segIndex + 1, trackPath.length - 1)];
    const lat = from[0] + (to[0] - from[0]) * segProgress;
    const lng = from[1] + (to[1] - from[1]) * segProgress;
    trackingBus.setLatLng([lat, lng]);
  }, 100);
}

// ── Save offline ──────────────────────────────────────────
function saveOffline() {
  alert('Browse the map areas you want to use offline — your browser automatically caches the map tiles. They will be available even without internet next time.');
}

// ── Fit to all cities ─────────────────────────────────────
if (cities.length > 0) {
  const group = L.featureGroup(Object.values(cityMarkers));
  map.fitBounds(group.getBounds(), { padding: [40, 40] });
}
</script>

</body>
</html>
